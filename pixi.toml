[workspace]
name = "openyxdb"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]
version = "1.0.0"

[dependencies]
cmake = ">=3.20"
ninja = ">=1.11"
cxx-compiler = ">=1.0"
c-compiler = ">=1.0"
catch2 = ">=3.4"
python = ">=3.9"
nanobind = ">=2.0"
pyarrow = ">=14.0"
pandas = ">=2.0"
polars = ">=0.20"
pytest = ">=7.0"

[tasks]
configure = "cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX"
configure-debug = "cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX"
build = { cmd = "cmake --build build && cp --remove-destination build/_openyxdb* python/openyxdb/ 2>/dev/null; cp --remove-destination build/libopenyxdb* python/openyxdb/ 2>/dev/null; cp build/openyxdb.dll python/openyxdb/ 2>/dev/null; true", depends-on = [
    "configure",
] }
test = { cmd = "ctest --test-dir build --output-on-failure", depends-on = [
    "build",
] }
test-python = { cmd = "pytest tests/ -v", depends-on = ["build"] }
clean = "rm -rf build"
