name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-cpp:
    name: C++ tests (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x64
            runner: warp-ubuntu-2404-x64-4x
          - os: macos-arm64
            runner: warp-macos-15-arm64-4x
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.4
          cache: true

      - name: Build
        run: pixi run build

      - name: Run C++ tests
        run: pixi run test

  test-python:
    name: Python tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x64
            runner: warp-ubuntu-2404-x64-4x
            python: "3.12"
          - os: macos-arm64
            runner: warp-macos-15-arm64-4x
            python: "3.12"
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.4
          cache: true

      - name: Build
        run: pixi run build

      - name: Run Python tests
        run: pixi run test-python
